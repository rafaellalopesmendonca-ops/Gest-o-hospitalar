<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <title>Sistema de Pacientes</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<nav class="navbar">
    <div class="logo"><i class="fas fa-hospital-symbol"></i> Hospital Central</div>
    <ul class="nav-links">
        <li><a href="#"><i class="fas fa-chart-line"></i> Painel</a></li>
        <li><a href="#"><i class="fas fa-user-injured"></i> Pacientes</a></li>
        <li><a href="#"><i class="fas fa-calendar-check"></i> Consultas</a></li>
        <li class="relogio-container"><i class="far fa-clock"></i> <span id="relogio">00:00:00</span></li>
    </ul>
</nav> 

<header class="hero">
    <h1>Gestão Hospitalar Inteligente</h1>
    <p>Cadastre e gerencie pacientes com segurança e agilidade.</p>
</header>

<main>
    <section class="dashboard">
        <div class="card-info">
            <i class="fas fa-users"></i>
            <div>
                <span id="totalPacientes">0</span>
                <p>Pacientes Totais</p>
            </div>
        </div>
        <div class="card-info">
            <i class="fas fa-clock"></i>
            <div>
                <span id="totalAguardando">0</span>
                <p>Aguardando</p>
            </div>
        </div>
        <div class="card-info">
            <i class="fas fa-user-md"></i>
            <div>
                <span>0</span>
                <p>Médicos Ativos</p>
            </div>
        </div>
    </section>

    <section class="container">
        <h2><i class="fas fa-user-plus"></i> Novo Cadastro</h2>
        <form id="formPaciente">
            <input type="text" id="nome" placeholder="Nome completo" required>
            <input type="text" id="cpf" placeholder="CPF (000.000.000-00)" required>
            <input type="text" id="telefone" placeholder="Telefone de contato">
            <input type="text" id="convenio" placeholder="Plano de Saúde / Convênio">
            
            <select id="prioridade" required>
                <option value="" disabled selected>Nível de Urgência</option>
                <option value="Emergência">Emergência (Vermelho)</option>
                <option value="Urgente">Urgente (Amarelo)</option>
                <option value="Eletivo">Eletivo (Verde)</option>
            </select>

            <input type="text" id="sintomas" placeholder="Sintomas apresentados" style="grid-column: span 2;">

            <button type="submit" id="btnCadastrar">
                <i class="fas fa-check-circle"></i> Finalizar Cadastro
            </button>
        </form>
    </section>

    <section class="tabela-section">
        <div class="header-lista">
            <h2>Lista de Pacientes</h2>
            <div class="acoes-lista">
                <button onclick="imprimirRelatorio()" class="btn-imprimir">
                    <i class="fas fa-print"></i> Imprimir Relatório
                </button>
                <div class="busca-container">
                    <i class="fas fa-search"></i>
                    <input type="text" id="busca" placeholder="Pesquisar paciente...">
                </div>
            </div>
        </div>
        
        <div class="tabela-container">
            <table>
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>CPF</th>
                        <th>Urgência</th>
                        <th>Sintomas</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="listaPacientes"></tbody>
            </table>
        </div>
    </section>

</main>

<script src="script.js"></script> 
</body>
</html>
